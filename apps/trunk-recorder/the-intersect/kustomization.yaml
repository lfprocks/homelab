apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: trunk-recorder

resources:
  - ../base/
  - trunk-recorder-etc-secret.sops.yaml
labels:
  - includeSelectors: true
    pairs:
      env: prod
      proj: trunk-recorder
patches:
  - path: trunk-recorder.yaml
  - path: trunk-recorder-secret.yaml
