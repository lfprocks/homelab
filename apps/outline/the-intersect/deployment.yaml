---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline
  namespace: outline
  labels:
    app.kubernetes.io/name: outline
spec:
  replicas: 1
  # RWO ceph-block PVC for local file storage -> never run two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: outline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outline
    spec:
      securityContext:
        # Outline image runs as uid/gid 1001 (nodejs); fsGroup makes the PVC writable.
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Outline does not auto-migrate on boot; run migrations once before start.
        - name: migrate
          image: docker.getoutline.com/outlinewiki/outline:1.8.1
          workingDir: /opt/outline
          # Invoke the sequelize binary directly via node. The image's global yarn
          # is 1.x while package.json pins yarn@4 via corepack, so "yarn db:migrate"
          # fails; the binary avoids yarn/corepack entirely (db:migrate == this).
          # --env=production keeps TLS on (rejectUnauthorized:false), matching the
          # encrypted connection used by the main container. Fallback if DB TLS ever
          # fails: "--env=production-ssl-disabled" + PGSSLMODE=disable.
          command: ["node", "./node_modules/.bin/sequelize", "db:migrate", "--env=production"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            # Same full app env as the server: data migrations boot the app config
            # and validate the whole env schema (URL, REDIS_URL, COLLABORATION_URL).
            - configMapRef:
                name: outline-env
            # SECRET_KEY, UTILS_SECRET, OIDC_CLIENT_ID, OIDC_CLIENT_SECRET
            - secretRef:
                name: outline-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: outline-postgres-app
                  key: uri
      containers:
        - name: outline
          image: docker.getoutline.com/outlinewiki/outline:1.8.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: outline-env
            - secretRef:
                name: outline-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: outline-postgres-app
                  key: uri
          volumeMounts:
            - name: data
              mountPath: /var/lib/outline/data
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: outline-data
