---
apiVersion: v1
kind: ConfigMap
metadata:
  name: weatherlinklive-timescaledb-inserter-env-configmap
data:
  CONFIG_PREFIX: "WLLTSDBI_"
  WLLTSDBI_LOG_LEVEL: "info"
  WLLTSDBI_METRICS_ENABLED: "true"
  WLLTSDBI_METRICS_PORT: "8081"
  WLLTSDBI_TRACING_ENABLED: "false"
  # WLLTSDBI_TIMESCALE_CONN_STRING and WLLTSDBI_WEATHERLINKLIVE_HOST are provided via the
  # SOPS-encrypted secret (envFrom secretRef), not this ConfigMap.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name weatherlinklive-timescaledb-inserter
  labels:
    app: *name
spec:
  selector:
    matchLabels:
      app: *name
  revisionHistoryLimit: 10
  replicas: 1
  template:
    metadata:
      labels:
        k8s.lfp.rocks/service: "weatherlinklive-timescaledb-inserter"
        k8s.lfp.rocks/version: "v0.0.1"
    spec:
      containers:
        - name: *name
          image: ghcr.io/michaelpeterswa/weatherlinklive-timescaledb-inserter:v0.0.1
