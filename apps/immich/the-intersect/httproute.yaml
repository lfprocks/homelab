---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-httproute
  namespace: immich
spec:
  parentRefs:
    - name: external-gateway-https
      namespace: cilium-ingress
  hostnames: ["${SUB_COPPER_ANCHOR}.${DOMAIN_CORONET_SUMMIT}"]
  rules:
    - backendRefs:
        - name: immich-server
          port: 2283
