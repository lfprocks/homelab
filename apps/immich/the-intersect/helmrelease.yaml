---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
    namespace: immich
  valuesFrom:
    - kind: ConfigMap
      name: immich-values
    - kind: Secret
      name: immich-values-secret
  interval: 1m0s
