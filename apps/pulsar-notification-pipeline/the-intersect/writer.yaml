---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pnp-writer-env-configmap
data:
  LOG_LEVEL: info
  METRICS_ENABLED: "true"
  METRICS_PORT: "8081"
  PULSAR_SERVICE_URL: pulsar://pulsar-proxy.pulsar.svc.cluster.local:6650
  PULSAR_TOPIC: persistent://public/default/notifications
  PULSAR_ENCRYPTION_KEY_DIR: /run/secrets/pulsar-keys
  PULSAR_ENCRYPTION_KEY_NAMES: v1
  WRITER_HTTP_ADDR: ":8080"
  WRITER_BEARER_TOKENS_FILE: /run/secrets/writer-tokens/tokens
  WRITER_IDEMPOTENCY_WINDOW: 5m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name pnp-writer
  labels:
    app: *name
spec:
  selector:
    matchLabels:
      app: *name
  revisionHistoryLimit: 10
  template:
    metadata:
      labels:
        k8s.lfp.rocks/service: "pnp-writer"
        k8s.lfp.rocks/version: "v1.0.0"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: k8s.lfp.rocks/gpu
                    operator: NotIn
                    values:
                      - enabled
      containers:
        - name: *name
          image: ghcr.io/michaelpeterswa/pulsar-notifcation-pipeline/writer:v1.0.0
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pnp-writer-httproute
  namespace: pnp
spec:
  parentRefs:
    - name: internal-gateway-http
      namespace: cilium-ingress
  hostnames: ["${SUB_COMMON_SENT}.${DOMAIN_COBRA_LANTERN}"]
  rules:
    - backendRefs:
        - name: pnp-writer
          port: 80
