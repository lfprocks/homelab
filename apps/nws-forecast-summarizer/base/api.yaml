---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nws-forecast-summarizer-env-configmap
data:
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name nws-forecast-summarizer
  labels:
    app: *name
  annotations:
    reloader.stakater.com/auto: "true"

spec:
  selector:
    matchLabels:
      app: *name
  template:
    metadata:
      labels:
        app: *name

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8081"
        prometheus.istio.io/merge-metrics: "false"
    spec:
      containers:
        - name: *name
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nws-forecast-summarizer-env-configmap
          ports:
            - name: api
              containerPort: 8080
            - name: metrics
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: metrics
            periodSeconds: 5
          resources:
            limits:
              memory: "256Mi"
            requests:
              cpu: "20m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nws-forecast-summarizer
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nws-forecast-summarizer-httproute
