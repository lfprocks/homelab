---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: naas-api-httproute
  namespace: naas-api
spec:
  parentRefs:
    - name: internal-gateway-http
      namespace: cilium-ingress
  hostnames: ["${SUB_CRIMSON_RANGER}.${DOMAIN_COBRA_LANTERN}"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      backendRefs:
        - name: naas-api
          port: 8080
