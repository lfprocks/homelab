  NAAS_OPS_ADDR: "0.0.0.0:8081"
  NAAS_MULTIPLIER: "100"
  NAAS_POOL_BYTES: "1048576"
  NAAS_MAX_REQUEST_BYTES: "1048576"
  NAAS_LOG_LEVEL: "info"
  # NAAS_SERIAL_ALLOWLIST: ""  # leave unset to use the first detected device
