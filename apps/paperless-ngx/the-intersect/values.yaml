#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/bjw-s/helm-charts/blob/a081de5/charts/library/common/values.yaml
#

image:
  # -- Image repository
  repository: ghcr.io/paperless-ngx/paperless-ngx
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag
  tag: 2.13.5

# -- Environment variables [[ref]](https://docs.paperless-ngx.com/configuration/)
# @default -- See [values.yaml](./values.yaml)
env:
  # -- Set the container timezone
  TZ: UTC
  PAPERLESS_SECRET_KEY: "kcdL2grgx5YbjFHjGqdUpeYhboOb+z+3c7Xbt3HI7sc="
  PAPERLESS_URL: "https://${SUB_PRAIRIE_ABLE}.${DOMAIN_CORONET_SUMMIT}"

service:
  main:
    ports:
      http:
        port: 8000

persistence:
  data:
    enabled: true
    retain: true
    mountPath: /usr/src/paperless/data
    storageClass: "smb-client"
    accessMode: ReadWriteOnce
    size: 1Gi

  media:
    enabled: true
    retain: true
    mountPath: /usr/src/paperless/media
    storageClass: "smb-client"
    accessMode: ReadWriteOnce
    size: 8Gi

  export:
    enabled: true
    retain: true
    mountPath: /usr/src/paperless/export
    storageClass: "smb-client"
    accessMode: ReadWriteOnce
    size: 1Gi

  consume:
    enabled: true
    retain: true
    mountPath: /usr/src/paperless/consume
    storageClass: "smb-client"
    accessMode: ReadWriteOnce
    size: 4Gi

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
    tag: "16.6.0-debian-12-r2"
  auth:
    database: paperless
    # postgresPassword is provided via the SOPS-encrypted paperless-ngx-values-secret (valuesFrom).
  primary:
    persistence:
      enabled: true
      storageClass: "smb-client"
      size: 8Gi
