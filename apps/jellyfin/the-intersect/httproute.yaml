---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin-httproute
  namespace: jellyfin
spec:
  parentRefs:
    - name: internal-gateway-http
      namespace: cilium-ingress
  hostnames: ["${SUB_ABSOLUTE_STAR}.${DOMAIN_COBRA_LANTERN}"]
  rules:
    - backendRefs:
        - name: jellyfin
          port: 8096
