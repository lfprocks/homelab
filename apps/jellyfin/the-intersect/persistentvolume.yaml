---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-pv
  namespace: jellyfin
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: smb-media-share
    volumeAttributes:
      source: "//${OLYMPIC_NAS_HOST}/media"
      csi.storage.k8s.io/node-stage-secret-name: smb-credentials
      csi.storage.k8s.io/node-stage-secret-namespace: storage
      csi.storage.k8s.io/node-publish-secret-name: smb-credentials
      csi.storage.k8s.io/node-publish-secret-namespace: storage
    nodeStageSecretRef:
      name: smb-credentials
      namespace: storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi # placeholder size, not a limit
  volumeName: media-pv
