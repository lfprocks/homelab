---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-env-configmap
data:
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name nginx
  labels:
    app: *name
spec:
  selector:
    matchLabels:
      app: *name
  revisionHistoryLimit: 10
  replicas: 1
  template:
    metadata:
      labels:
        k8s.lfp.rocks/service: "nginx"
        k8s.lfp.rocks/version: "1.27.3-alpine-slim"
    spec:
      containers:
        - name: *name
          image: nginx:1.27.3-alpine-slim
          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: nginx-pvc-volume
              subPath: "webcam-scraper"

      volumes:
        - name: nginx-pvc-volume
          persistentVolumeClaim:
            claimName: webcam-scraper-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: webcam-scraper-nginx
  labels:
    app: nginx
    service: webcam-scraper
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: nginx
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webcam-scraper-nginx-httproute
  namespace: webcam-scraper
spec:
  parentRefs:
    - name: external-gateway-https
      namespace: cilium-ingress
  hostnames: ["${SUB_COMPASS_QUARRY}.${DOMAIN_COMMON_STAR}"]
  rules:
    - backendRefs:
        - name: webcam-scraper-nginx
          port: 80
