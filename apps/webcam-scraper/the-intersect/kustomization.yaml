apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: webcam-scraper

resources:
  - ../base/
labels:
  - includeSelectors: true
    pairs:
      env: prod
      proj: webcam-scraper
patches:
  - path: api.yaml
  - path: api_secret.yaml
  - path: nginx.yaml
  - path: persistentvolume.yaml
