---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name r53u2
  labels:
    app: *name
  annotations:
    reloader.stakater.com/auto: "true"

spec:
  selector:
    matchLabels:
      app: *name
  template:
    metadata:
      labels:
        app: *name
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8081"
        prometheus.istio.io/merge-metrics: "false"
    spec:
      containers:
        - name: *name
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: r53u2-env-configmap
            - secretRef:
                name: r53u2-env-secret
          ports:
            - name: metrics
              containerPort: 8081
          resources:
            limits:
              memory: "256Mi"
            requests:
              cpu: "20m"
              memory: "128Mi"
