---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name r53u2
  labels:
    app: *name
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *name
  revisionHistoryLimit: 10
  template:
    metadata:
      labels:
        k8s.lfp.rocks/service: "r53u2"
        k8s.lfp.rocks/version: "1.0.2"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: k8s.lfp.rocks/gpu
                    operator: NotIn
                    values:
                      - enabled
      containers:
        - name: *name
          image: ghcr.io/michaelpeterswa/r53u2:v1.0.2
