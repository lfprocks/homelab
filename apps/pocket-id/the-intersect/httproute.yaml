---
# Pocket-ID is the identity provider -- it serves its own passkey login, so it is
# NOT placed behind oauth2-proxy.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pocket-id-httproute
  namespace: pocket-id
spec:
  parentRefs:
    - name: external-gateway-https
      namespace: cilium-ingress
  hostnames: ["${SUB_AMBER_MERIDIAN}.${DOMAIN_CORONET_SUMMIT}"]
  rules:
    - backendRefs:
        - name: pocket-id
          port: 80
