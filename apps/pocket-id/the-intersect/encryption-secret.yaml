# NOTE: this file ships unencrypted as a TEMPLATE. Pocket-ID v2 REQUIRES
# ENCRYPTION_KEY (>=16 bytes) -- it encrypts data at rest (OIDC client secrets,
# signing keys, etc.). Generate a value and encrypt before committing:
#   openssl rand -base64 32
#   sops -e --in-place apps/pocket-id/the-intersect/encryption-secret.yaml
#
# Keep this key safe and stable: losing/changing it makes existing encrypted
# rows unreadable.
apiVersion: v1
kind: Secret
metadata:
  name: pocket-id-env-secret
type: Opaque
stringData:
  ENCRYPTION_KEY: <RUN openssl rand -base64 32>
