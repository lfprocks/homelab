---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name asr
  labels:
    app: *name
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *name
  revisionHistoryLimit: 10
  template:
    metadata:
      labels:
        k8s.lfp.rocks/service: "asr"
        k8s.lfp.rocks/version: "v1.3.1"
    spec:
      containers:
        - name: *name
          image: ghcr.io/searchandrescuegg/asr:v1.3.1
---
apiVersion: v1
kind: Service
metadata:
  name: asr
  labels:
    app: asr
    service: asr
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: asr
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: asr-httproute
  namespace: asr
spec:
  parentRefs:
    - name: internal-gateway-http
      namespace: cilium-ingress
  hostnames: ["${SUB_LOOKING_STAR}.${DOMAIN_COBRA_LANTERN}"]
  rules:
    - backendRefs:
        - name: asr
          port: 80
