---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: invidious-httproute
  namespace: invidious
spec:
  parentRefs:
    - name: external-gateway-https
      namespace: cilium-ingress
  hostnames: ["${SUB_PAVE_LEDGER}.${DOMAIN_CORONET_SUMMIT}"]
  rules:
    - backendRefs:
        - name: invidious
          port: 3000
