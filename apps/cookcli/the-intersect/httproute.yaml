---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cookcli-httproute
  namespace: cookcli
spec:
  parentRefs:
    - name: external-gateway-https
      namespace: cilium-ingress
  hostnames: ["${SUB_RUGGED_COMET}.${DOMAIN_CORONET_SUMMIT}"]
  rules:
    - backendRefs:
        - name: cookcli
          port: 80
