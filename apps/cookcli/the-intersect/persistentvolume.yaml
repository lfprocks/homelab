---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: cookcli-pv
  namespace: cookcli
spec:
  storageClassName: ""
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - dir_mode=0700
    - file_mode=0700
    - uid=1000 # cookcli runs as 1000:1000
    - gid=1000
    - forceuid
    - forcegid
    - nobrl
    - mfsymlinks
    - cache=strict
    - noserverino # required to prevent data corruption
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: smb-cookcli-share
    volumeAttributes:
      source: "//${OLYMPIC_NAS_HOST}/kubernetes"
      csi.storage.k8s.io/node-stage-secret-name: smb-credentials
      csi.storage.k8s.io/node-stage-secret-namespace: storage
      csi.storage.k8s.io/node-publish-secret-name: smb-credentials
      csi.storage.k8s.io/node-publish-secret-namespace: storage
    nodeStageSecretRef:
      name: smb-credentials
      namespace: storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cookcli-pvc
  namespace: cookcli
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi # placeholder size, not a limit
  volumeName: cookcli-pv
