# NOTE: this file ships unencrypted as a TEMPLATE. Fill in the real values and
# encrypt before committing:
#   sops -e --in-place apps/cookcli/the-intersect/oauth2-proxy-secret.yaml
#
# Reuse openwebui's Google OAuth client-id/client-secret AND the same
# cookie-secret to get single sign-on across *.${DOMAIN_CORONET_SUMMIT}.
# Also add https://<cookcli-host>/oauth2/callback as an authorized redirect URI
# on that Google OAuth client.
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secrets
type: Opaque
stringData:
  client-id: <GOOGLE_OAUTH_CLIENT_ID>
  client-secret: <GOOGLE_OAUTH_CLIENT_SECRET>
  # 32-byte base64/hex cookie secret (reuse openwebui's for shared SSO)
  cookie-secret: <COOKIE_SECRET>
