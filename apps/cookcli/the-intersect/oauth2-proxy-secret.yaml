# NOTE: this file ships unencrypted as a TEMPLATE. Fill in the real values and
# encrypt before committing:
#   sops -e --in-place apps/cookcli/the-intersect/oauth2-proxy-secret.yaml
#
# Use the shared Pocket-ID "homelab-apps" OIDC client's client-id/client-secret
# (the wildcard-callback client). Generate a cookie-secret with:
#   openssl rand -base64 32 | head -c 32 | base64   # 32-byte value
# Reuse the same client + cookie-secret for every Pocket-ID app to get SSO.
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secrets
type: Opaque
stringData:
  client-id: <POCKET_ID_CLIENT_ID>
  client-secret: <POCKET_ID_CLIENT_SECRET>
  cookie-secret: <COOKIE_SECRET>
