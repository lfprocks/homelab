---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cookcli-env-configmap
data:
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name cookcli
  labels:
    app: *name
spec:
  selector:
    matchLabels:
      app: *name
  revisionHistoryLimit: 10
  replicas: 1
  template:
    metadata:
      labels:
        app: *name
        k8s.lfp.rocks/service: "cookcli"
        k8s.lfp.rocks/version: "v0.30.0"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: k8s.lfp.rocks/gpu
                    operator: NotIn
                    values:
                      - enabled
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # cookcli's entrypoint refuses to start unless /recipes is writable, so
        # the read-only ConfigMap can't be mounted there directly. Seed the
        # versioned recipes into a writable emptyDir instead. A recipe change
        # bumps the ConfigMap hash -> pod restarts -> fresh re-seed.
        - name: seed-recipes
          image: ghcr.io/cooklang/cookcli:0.30.0
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "cp /recipes-src/*.cook /recipes/"]
          volumeMounts:
            - name: recipes-src
              mountPath: /recipes-src
              readOnly: true
            - name: recipes
              mountPath: /recipes
      containers:
        - name: *name
          # Image default ENTRYPOINT/CMD already runs `cook server /recipes --host`
          # binding 0.0.0.0:9080, so no command/args override is needed.
          image: ghcr.io/cooklang/cookcli:0.30.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: cookcli-env-configmap
          ports:
            - name: http
              containerPort: 9080
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          resources:
            limits:
              memory: "256Mi"
            requests:
              cpu: "20m"
              memory: "64Mi"
          volumeMounts:
            - name: recipes
              mountPath: /recipes
      volumes:
        - name: recipes-src
          configMap:
            name: cookcli-recipes
        - name: recipes
          emptyDir: {}
