---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lfpweather-frontend-env-configmap
data:
  FORECAST_INFERENCE_API_BASE_URL: https://${SUB_COMBAT_PILGRIM}.${DOMAIN_COMMON_STAR}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &name lfpweather-frontend
  labels:
    app: *name
spec:
  selector:
    matchLabels:
      app: *name
  revisionHistoryLimit: 10
  template:
    metadata:
      labels:
        k8s.lfp.rocks/service: "lfpweather-frontend"
        k8s.lfp.rocks/version: "v1.2.1"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: k8s.lfp.rocks/gpu
                    operator: NotIn
                    values:
                      - enabled
      containers:
        - name: *name
          image: ghcr.io/michaelpeterswa/lfpweather.com:v1.2.1
          env:
            - name: KEEP_ALIVE_TIMEOUT
              value: "70000"
          resources:
            requests:
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lfpweather-frontend
  labels:
    app: lfpweather-frontend
    service: lfpweather-frontend
spec:
  ports:
    - name: http
      port: 80
      targetPort: frontend
  selector:
    app: lfpweather-frontend
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lfpweather-frontend-httproute
  namespace: lfpweather
spec:
  parentRefs:
    - name: external-gateway-https
      namespace: cilium-ingress
  hostnames: ["${DOMAIN_COMMON_STAR}"]
  rules:
    - backendRefs:
        - name: lfpweather-frontend
          port: 80
