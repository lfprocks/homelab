---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: alloy
  namespace: grafana
spec:
  chart:
    spec:
      chart: alloy
      sourceRef:
        kind: HelmRepository
        name: grafana
      version: 0.3.1
  valuesFrom:
    - kind: ConfigMap
      name: alloy-values
  interval: 1m0s
