apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-enp5s0
  namespace: kube-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "enp5s0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "${MACVLAN_SUBNET}",
        "rangeStart": "${MACVLAN_RANGE_START}",
        "rangeEnd": "${MACVLAN_RANGE_END}",
        "gateway": "${MACVLAN_GATEWAY}",
        "routes": [
          {
            "dst": "0.0.0.0/0"
          }
        ]
      }
    }
