---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: akri
  namespace: akri
spec:
  interval: 5m
  chart:
    spec:
      chart: akri
      version: 0.13.8
      sourceRef:
        kind: HelmRepository
        name: akri
        namespace: akri
      interval: 5m
  # https://gist.github.com/ammmze/74c0472214dc641c8252c40312a27af8
  values:
    prometheus:
      enabled: true
    udev:
      discovery:
        enabled: true
        resources:
          # memoryRequest: 11Mi
          # cpuRequest: 10m
          memoryLimit: 100Mi
          cpuLimit: 200m
