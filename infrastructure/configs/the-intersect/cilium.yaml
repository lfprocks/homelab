---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: main-pool
spec:
  blocks:
    - start: "${CILIUM_LBIPAM_START}"
      stop: "${CILIUM_LBIPAM_STOP}"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: main-pool-l2
spec:
  loadBalancerIPs: true
  externalIPs: true
