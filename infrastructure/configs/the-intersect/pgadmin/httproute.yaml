---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pgadmin-httproute
  namespace: pgadmin
spec:
  parentRefs:
    - name: internal-gateway-http
      namespace: cilium-ingress
  hostnames: ["${SUB_STEEL_KEYSTONE}.${DOMAIN_COBRA_LANTERN}"]
  rules:
    - backendRefs:
        - name: pgadmin4
          port: 80
