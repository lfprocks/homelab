---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: pgadmin4
  namespace: pgadmin
spec:
  chart:
    spec:
      chart: pgadmin4
      sourceRef:
        kind: HelmRepository
        name: runix
        namespace: pgadmin
      version: 1.34.0
  interval: 1m0s
  valuesFrom:
    - kind: Secret
      name: pgadmin4-values-secret
  values:
    env:
      email: "admin@lfp.rocks"
      # password provided via pgadmin4-values-secret (valuesFrom)
    persistentVolume:
      storageClass: "smb-client"
