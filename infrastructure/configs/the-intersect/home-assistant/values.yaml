resources:
  limits:
    cpu: 1
    memory: 768Mi
  requests:
    cpu: 512m
    memory: 512Mi

nodeSelector:
  kubernetes.io/hostname: the-intersect-worker-03

podAnnotations:
  k8s.v1.cni.cncf.io/networks: kube-system/macvlan-eno1

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi
  storageClass: "ceph-block"

configuration:
  enabled: true
  forceInit: true
  trusted_proxies:
    - 10.0.0.0/8
  templateConfig: |-
    # Loads default set of integrations. Do not remove.
    default_config:

    {{- if or .Values.ingress.enabled .Values.ingress.external }}
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        {{- range .Values.configuration.trusted_proxies }}
        - {{ . }}
        {{- end }}
    {{- end}}
    # Load frontend themes from the themes folder
    frontend:
      themes: !include_dir_merge_named themes

    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml

    logger:
      default: warning
      logs:
        homeassistant.components.homekit: debug
        pyhap: debug

ingress:
  external: true # required to set the trusted proxies
