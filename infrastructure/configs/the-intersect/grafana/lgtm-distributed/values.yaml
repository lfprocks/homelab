tempo:
  # -- Deploy Tempo if enabled.  See [upstream readme](https://github.com/grafana/helm-charts/blob/main/charts/tempo-distributed/README.md#values) for full values reference.
  enabled: true

  minio:
    enabled: false

  # Enable OTLP receivers on the distributor. Without this the
  # distributor's `receivers:` block is null and the service only exposes
  # the internal HTTP (3100) and gRPC (9095) ports — no OTLP intake.
  # With this set, the chart adds 4317 (gRPC) and 4318 (HTTP) to the
  # distributor service so cluster apps (and Alloy) can push spans.
  traces:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true

  ingester:
    podAnnotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "3100"
      prometheus.io/scrape: "true"
      prometheus.istio.io/merge-metrics: "false"
    resources:
      requests:
        cpu: 5m
        memory: 60Mi
      limits:
        cpu: 50m
        memory: 100Mi
    extraVolumes:
      - name: lgtm-distributed-service-account-secret
