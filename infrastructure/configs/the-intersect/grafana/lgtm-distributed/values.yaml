---
grafana:
  # -- Deploy Grafana if enabled. See [upstream readme](https://github.com/grafana/helm-charts/tree/main/charts/grafana#configuration) for full values reference.
  enabled: true

  image:
    tag: 12.1.0

  resources:
    requests:
      cpu: 10m
      memory: 150Mi
    limits:
      cpu: 256m
      memory: 512Mi

  persistence:
    enabled: true
    size: 10Gi
    storageClassName: smb-client

  # env:
  #   - name: "GF_PANELS_DISABLE_SANITIZE_HTML"
  #     value: "true"

  plugins:
    - https://grafana.com/api/plugins/operato-windrose-panel/versions/1.2.0/download;operato-windrose-panel

  grafana.ini:
    feature_toggles:
      provisioning: true
      kubernetesDashboards: true
    server:
      root_url: https://${SUB_SENIOR_ABLE}.${DOMAIN_CORONET_SUMMIT}

  # -- Grafana data sources config. Connects to all three by default
  datasources:
    datasources.yaml:
      apiVersion: 1
      # -- Datasources linked to the Grafana instance. Override if you disable any components.
      datasources:
        # https://grafana.com/docs/grafana/latest/datasources/loki/#provision-the-loki-data-source
        - name: Loki
          uid: loki
          type: loki
          url: http://{{ .Release.Name }}-loki-gateway
          isDefault: false
        # https://grafana.com/docs/grafana/latest/datasources/prometheus/#provision-the-data-source
        - name: Mimir
          uid: prom
          type: prometheus
          url: http://{{ .Release.Name }}-mimir-nginx/prometheus
          isDefault: true
        # https://grafana.com/docs/grafana/latest/datasources/tempo/configure-tempo-data-source/#provision-the-data-source
        - name: Tempo
          uid: tempo
          type: tempo
          url: http://{{ .Release.Name }}-tempo-query-frontend:3100
          isDefault: false
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
            lokiSearch:
              datasourceUid: loki
            tracesToMetrics:
              datasourceUid: prom
            serviceMap:
              datasourceUid: prom

loki:
  # -- Deploy Loki if enabled. See [upstream readme](https://github.com/grafana/helm-charts/tree/main/charts/loki-distributed#values) for full values reference.
  enabled: true

  distributor:
    podAnnotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "3100"
      prometheus.io/scrape: "true"
      prometheus.istio.io/merge-metrics: "false"
    resources:
      requests:
        cpu: 30m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 150Mi

  gateway:
    podAnnotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "8080"
      prometheus.io/scrape: "true"
      prometheus.istio.io/merge-metrics: "false"
    resources:
      requests:
        cpu: 5m
        memory: 20Mi
      limits:
        cpu: 50m
        memory: 50Mi

  loki:
    # auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-04-01"
          index:
            period: 24h
            prefix: loki_index_
          object_store: gcs
          schema: v13
          store: tsdb
    storageConfig:
      boltdb_shipper:
        shared_store: gcs
        active_index_directory: /var/loki/index
        cache_location: /var/loki/cache
        cache_ttl: 1h
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-index
        cache_location: /var/loki/tsdb-cache
      gcs:
        bucket_name: lfpr-p-gcsb-usw1-loki-chunks-l2lw-134f300
    structuredConfig:
      auth_enabled: false
      ruler:
        alertmanager_url: http://localhost
        enable_api: true
        storage:
          type: gcs
          gcs:
            bucket_name: lfpr-p-gcsb-usw1-loki-ruler-l2lw-1db580e

  ingester:
    podAnnotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "3100"
      prometheus.io/scrape: "true"
      prometheus.istio.io/merge-metrics: "false"
    resources:
      requests:
        cpu: 20m
        memory: 400Mi
      limits:
        cpu: 200m
        memory: 600Mi
    extraVolumes:
      - name: lgtm-distributed-service-account-secret
        secret:
          secretName: lgtm-distributed-service-account-secret
    extraVolumeMounts:
      - name: lgtm-distributed-service-account-secret
        mountPath: /etc/service-account
        readOnly: true
    extraEnv:
      - name: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/service-account/service-account.json

  compactor:
    podAnnotations:
      prometheus.io/path: /metrics
      prometheus.io/port: "3100"
      prometheus.io/scrape: "true"
      prometheus.istio.io/merge-metrics: "false"
    extraVolumes:
      - name: lgtm-distributed-service-account-secret
