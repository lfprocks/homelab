---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kube-state-metrics
  namespace: prometheus
spec:
  releaseName: kube-state-metrics
  chart:
    spec:
      chart: kube-state-metrics
      version: 6.1.4
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: prometheus
  interval: 5m0s
  values:
    extraArgs:
      - "--metric-labels-allowlist=daemonsets=[namespace,daemonset],deployments=[namespace,deployment],statefulsets=[namespace,statefulset],horizontalpodautoscalers=[namespace,horizontalpodautoscaler],pods=[*]"
