---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: openwebui
  namespace: openwebui
spec:
  chart:
    spec:
      chart: open-webui
      sourceRef:
        kind: HelmRepository
        name: openwebui
        namespace: openwebui
      version: 12.13.0
  interval: 1m0s
  values:
    ollama:
      enabled: false
    pipelines:
      enabled: true
    persistence:
      storageClass: smb-client
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: openwebui-open-webui
            patch: |
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: openwebui-open-webui
              spec:
                template:
                  spec:
                    containers:
                      - name: oauth2-proxy
                        image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
                        args:
                          - --provider=google
                          - --email-domain=*
                          - --authenticated-emails-file=/etc/oauth2-proxy/authenticated-emails.txt
                          - --cookie-domain=.${DOMAIN_CORONET_SUMMIT}
                          - --cookie-secure=true
                          - --cookie-samesite=lax
                          - --cookie-name=_oauth2_proxy
                          - --cookie-expire=168h
                          - --cookie-refresh=1h
                          - --set-xauthrequest=true
                          - --reverse-proxy=true
                          - --whitelist-domain=.${DOMAIN_CORONET_SUMMIT}
                          - --upstream=http://localhost:8080
                          - --skip-provider-button=true
                          - --code-challenge-method=S256
                          - --http-address=0.0.0.0:4180
                        env:
                          - name: OAUTH2_PROXY_CLIENT_ID
                            valueFrom:
                              secretKeyRef:
                                name: oauth2-proxy-secrets
                                key: client-id
                          - name: OAUTH2_PROXY_CLIENT_SECRET
                            valueFrom:
                              secretKeyRef:
                                name: oauth2-proxy-secrets
                                key: client-secret
                          - name: OAUTH2_PROXY_COOKIE_SECRET
                            valueFrom:
                              secretKeyRef:
                                name: oauth2-proxy-secrets
                                key: cookie-secret
                        ports:
                          - containerPort: 4180
                            name: oauth2-proxy
                        volumeMounts:
                          - name: authenticated-emails
                            mountPath: /etc/oauth2-proxy
                            readOnly: true
                    volumes:
                      - name: authenticated-emails
                        secret:
                          secretName: oauth2-proxy-emails
          - target:
              kind: Service
              name: openwebui-open-webui
            patch: |
              apiVersion: v1
              kind: Service
              metadata:
                name: openwebui-open-webui
              spec:
                ports:
                  - name: oauth2-proxy
                    port: 4180
                    targetPort: 4180
                    protocol: TCP
