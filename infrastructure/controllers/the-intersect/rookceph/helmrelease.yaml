---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  chart:
    spec:
      chart: rook-ceph
      sourceRef:
        kind: HelmRepository
        name: rook-release
      version: 1.17.6
  interval: 1m0s
  values:
    crds:
      enable: true
    resources:
      limits:
        memory: "2Gi"
        cpu: "500m"
      requests:
        memory: "256Mi"
        cpu: "100m"
