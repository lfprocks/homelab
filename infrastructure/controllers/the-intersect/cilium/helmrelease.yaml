---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  chart:
    spec:
      chart: cilium
      sourceRef:
        kind: HelmRepository
        name: cilium
      version: "1.19.2"
  interval: 1h
  values:
    cni:
      exclusive: false

    ipam:
      mode: kubernetes

    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 7445

    gatewayAPI:
      enabled: true
      enableAlpn: true
      enableAppProtocol: true
      xffNumTrustedHops: 0
      externalTrafficPolicy: Cluster

    l2announcements:
      enabled: true
    externalIPs:
      enabled: true

    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE

    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - icmp
          - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
        enableOpenMetrics: true

    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
