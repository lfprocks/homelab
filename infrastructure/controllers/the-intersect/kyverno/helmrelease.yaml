---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  chart:
    spec:
      chart: kyverno
      sourceRef:
        kind: HelmRepository
        name: kyverno
      version: 3.3.4
  interval: 1m0s
  values:
    installCRDs: true

    policyReportsCleanup:
      image:
        registry: docker.io
        repository: bitnami/kubectl
        tag: latest

    admissionController:
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.istio.io/merge-metrics: "false"
      container:
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 128Mi

    backgroundController:
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.istio.io/merge-metrics: "false"
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 64Mi

    cleanupController:
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.istio.io/merge-metrics: "false"
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 64Mi

    reportsController:
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.istio.io/merge-metrics: "false"
      resources:
        limits:
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 64Mi
