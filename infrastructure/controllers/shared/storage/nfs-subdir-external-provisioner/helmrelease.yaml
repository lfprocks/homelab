---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: storage
spec:
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: storage
      version: 4.0.18
  interval: 1m0s
  values:
    nfs:
      server: ${OLYMPIC_NAS_HOST}
      path: /mnt/main/kubernetes
