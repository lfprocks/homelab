apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml
patches:
# Enable SOPS decryption on the root sync Kustomization so it can apply the
# encrypted cluster-vars Secret (consumed by every child Kustomization via
# postBuild.substituteFrom). Applied bootstrap-safely as a patch so it survives
# `flux bootstrap` regenerating gotk-sync.yaml.
- target:
    kind: Kustomization
    name: flux-system
  patch: |
    - op: add
      path: /spec/decryption
      value:
        provider: sops
        secretRef:
          name: sops-age
