---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: solar-pi-infra-configs
  namespace: flux-system
spec:
  dependsOn:
    - name: solar-pi-shared-infra-controllers
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/configs/solar-pi
  prune: true
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
