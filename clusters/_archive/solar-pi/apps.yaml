---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: solar-pi-apps-letterkenny-api
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: solar-pi-infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: apps/letterkenny-api/solar-pi
  prune: true
  wait: true
  timeout: 5m0s
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
